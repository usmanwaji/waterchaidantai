<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#423d38">
<title>ผู้ดูแลระบบ | One Map ชายแดนใต้</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#fcfaf7;--ink:#423d38;--muted:#797067;--elevated:#ffffff;--outline:#e3e0dd;--outline-strong:#d1d5dc;--orange:#fe6e00;--orange-d:#ff6b00;--navy:#57504a;--navy-d:#423d38;--peach:#e3e0dd;--shell:rgba(0,0,0,.72);--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:'Noto Sans Thai',Tahoma,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
header{background:var(--shell);backdrop-filter:blur(12px) saturate(1.2);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:700}
header h1 small{display:block;font-size:11px;font-weight:400;opacity:.85}
.navtab{display:flex;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:3px;overflow-x:auto}
.navtab a{color:rgba(255,255,255,.72);text-decoration:none;font-size:12px;font-weight:600;padding:5px 11px;border-radius:6px;white-space:nowrap}
.navtab a:hover{color:#fff;background:rgba(255,255,255,.10)}
#authBox{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px}
#authBox button{background:var(--orange);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-family:inherit;font-weight:600;font-size:12.5px;cursor:pointer}
#authBox button:hover{background:var(--orange-d)}

#content{flex:1;max-width:900px;width:100%;margin:0 auto;padding:20px 16px 40px}
.gatebox{max-width:440px;margin:60px auto;text-align:center;background:var(--elevated);border:1px solid var(--outline);border-radius:14px;padding:28px 24px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gatebox button{margin-top:14px;background:var(--orange);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
.gatebox button:hover{background:var(--orange-d)}

.card{background:var(--elevated);border:1px solid var(--outline);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.10);margin-bottom:16px}
.card h2{font-size:14.5px;color:var(--navy-d);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h2 .cnt{background:var(--outline);color:var(--navy-d);border-radius:99px;font-size:11px;padding:1px 9px;font-weight:600}
.urow{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--outline);border-radius:10px;padding:9px 12px;margin-bottom:7px}
.urow .nm{font-weight:700;font-size:13.5px}
.urow .em{color:var(--muted);font-size:11.5px}
.urow .when{color:var(--muted);font-size:10.5px;margin-top:2px}
.urow .btns{display:flex;gap:6px;flex-shrink:0}
.urow button{border:none;border-radius:8px;padding:6px 12px;font-family:inherit;font-weight:600;font-size:12px;cursor:pointer;color:#fff}
.btn-approve{background:var(--ok)}.btn-approve:hover{background:#128a3e}
.btn-reject{background:var(--bad)}.btn-reject:hover{background:#b91c1c}
.btn-revoke{background:var(--muted)}.btn-revoke:hover{background:#5c564f}
.empty{color:var(--muted);font-size:12.5px;padding:6px 0}
.pill{padding:1px 9px;border-radius:99px;font-size:10.5px;font-weight:600;color:#fff}

/* ===== Mobile & touch enhancements ===== */
a,button,select,input,.chip{touch-action:manipulation;-webkit-tap-highlight-color:rgba(254,110,0,.15)}
.navtab{scrollbar-width:none}
.navtab::-webkit-scrollbar{display:none}
.navtab a:focus-visible,button:focus-visible{outline:2px solid var(--orange);outline-offset:1px}
@supports(padding:max(0px)){header{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}}
@media(pointer:coarse){.navtab a{padding:9px 13px;font-size:13px}}
@media(max-width:768px){input:not([type=checkbox]):not([type=radio]),select,textarea{font-size:16px}}
@media(max-width:640px){
  header{padding:8px 10px;gap:8px}
  header h1{font-size:15px}
  .navtab{order:5;flex-basis:100%}
  #authBox{margin-left:0;width:100%;justify-content:flex-end}
  #content{padding:14px 10px 32px}
  .urow{flex-direction:column;align-items:flex-start}
  .urow .btns{width:100%;justify-content:flex-end}
  .urow button{padding:9px 14px;min-height:40px}
  .gatebox{margin:32px auto;padding:22px 16px}
}
</style>
</head>
<body>

<header>
  <h1>🛠️ ผู้ดูแลระบบ<small>อนุมัติผู้ใช้งาน — One Map ชายแดนใต้</small></h1>
  <nav class="navtab" aria-label="เมนูหลัก">
    <a href="index.html">🌤️ หน้าแรก</a>
    <a href="route.html">🚗 เส้นทาง</a>
    <a href="resources.html">🚜 ทรัพยากร</a>
    <a href="eoc.html">🎛️ EOC</a>
    <a href="people.html">🧓 กลุ่มเปราะบาง</a>
  </nav>
  <div id="authBox"></div>
</header>

<div id="content">
  <div id="gate"></div>
  <div id="panels" style="display:none">

    <div class="card">
      <h2>⏳ รออนุมัติ <span class="cnt" id="cntPending">0</span></h2>
      <div id="listPending"></div>
    </div>

    <div class="card">
      <h2>✅ อนุมัติแล้ว <span class="cnt" id="cntApproved">0</span></h2>
      <div id="listApproved"></div>
    </div>

    <div class="card">
      <h2>🚫 ถูกปฏิเสธ <span class="cnt" id="cntRejected">0</span></h2>
      <div id="listRejected"></div>
    </div>

    <div class="card">
      <h2>💓 สุขภาพแหล่งข้อมูล (Data Health) <button onclick="checkHealth()" style="margin-left:auto;border:1px solid var(--outline-strong);background:#fff;border-radius:7px;padding:4px 10px;font-family:inherit;font-size:12px;cursor:pointer">↻ ตรวจใหม่</button></h2>
      <div id="healthList"><div class="empty">กำลังตรวจสอบ…</div></div>
      <div class="when" id="healthUpd" style="margin-top:4px"></div>
    </div>

    <div class="card">
      <h2>🧾 บันทึกการดำเนินการ (Audit Log) <span class="cnt" id="cntAudit">0</span></h2>
      <div id="auditList"></div>
    </div>

  </div>
</div>

<script src="js/supabase-client.js?v=2"></script>
<script>
'use strict';
const esc = s => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtWhen = t => t ? new Date(t).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'}) : '—';

const PROVS = ['นราธิวาส','ปัตตานี','ยะลา','สงขลา','สตูล'];
function scopeSelect(p){
  if(p.role==='admin' && !p.province_scope){ /* super-admin: ทุกจังหวัด ปรับได้เช่นกัน */ }
  const opts = `<option value="">ทุกจังหวัด</option>` + PROVS.map(v=>`<option value="${v}" ${p.province_scope===v?'selected':''}>${v}</option>`).join('');
  return `<div class="when">ขอบเขตจังหวัด: <select onchange="setScope('${p.id}',this.value)" style="font-family:inherit;font-size:11px;padding:2px 5px;border:1px solid var(--outline-strong);border-radius:6px">${opts}</select></div>`;
}
async function setScope(id, scope){
  const { error } = await sb.from('profiles').update({ province_scope: scope||null }).eq('id', id);
  if(error){ alert('ตั้งขอบเขตไม่สำเร็จ: '+error.message); return; }
  logAudit('set_scope', id, { province_scope: scope||null });
}
async function logAudit(action, target, detail){
  try{ const me = await getUser(); await sb.from('audit_log').insert({ actor: me?.id, actor_email: me?.email, action, target, detail: detail||null }); }catch(e){}
  if(document.getElementById('auditList')) loadAudit();
}

/* ---------- Data Health: ตรวจแหล่งข้อมูลต้นทาง ---------- */
const HEALTH_SRC = [
  {n:'สสน. ระดับน้ำ (thaiwater)', u:'https://api-v3.thaiwater.net/api/v1/thaiwater30/public/waterlevel?province_code=96'},
  {n:'สสน. ฝนสะสม 3 วัน',        u:'https://api-v3.thaiwater.net/api/v1/thaiwater30/provinces/rain3d'},
  {n:'Open-Meteo พยากรณ์',       u:'https://api.open-meteo.com/v1/forecast?latitude=6.4&longitude=101.8&hourly=precipitation&forecast_days=1&timezone=Asia%2FBangkok'},
  {n:'ปภ. CCTV (ArcGIS)',        u:'https://gis-portal.disaster.go.th/arcgis/rest/services/Map_DDPM_CCTV/DDPM_CCTV_STATION_PROD/FeatureServer/0/query?where=code%3D%27NWT02%27&outFields=code&returnGeometry=false&f=json'},
  {n:'โทรมาตร ชป. (telerid)',     u:'https://telerid.rid.go.th/restapi/main/station_list/'},
  {n:'Supabase (ฐานข้อมูลระบบ)',  sb:true}
];
async function pingOne(s){
  const t0 = performance.now();
  try{
    if(s.sb){ const { error } = await sb.from('profiles').select('id',{count:'exact',head:true}); if(error) throw error; }
    else{ const ctl = new AbortController(); const to = setTimeout(()=>ctl.abort(),8000);
      const r = await fetch(s.u,{signal:ctl.signal}); clearTimeout(to); if(!r.ok) throw new Error('HTTP '+r.status); await r.text(); }
    return { ok:true, ms:Math.round(performance.now()-t0) };
  }catch(e){ return { ok:false, ms:Math.round(performance.now()-t0), err:e.message||String(e) }; }
}
async function checkHealth(){
  const el = document.getElementById('healthList'); if(!el) return;
  el.innerHTML = '<div class="empty">กำลังตรวจสอบ…</div>';
  const rows = await Promise.all(HEALTH_SRC.map(pingOne));
  el.innerHTML = HEALTH_SRC.map((s,i)=>{ const r=rows[i];
    return `<div class="urow"><div><div class="nm">${r.ok?'🟢':'🔴'} ${esc(s.n)}</div><div class="em">${r.ok?('ตอบสนอง '+r.ms+' มิลลิวินาที'):('ล้มเหลว: '+esc(r.err||'ไม่ทราบสาเหตุ'))}</div></div></div>`;
  }).join('');
  document.getElementById('healthUpd').textContent = 'ตรวจล่าสุด ' + new Date().toLocaleTimeString('th-TH');
}
async function loadAudit(){
  const el = document.getElementById('auditList'); if(!el) return;
  const { data, error } = await sb.from('audit_log').select('*').order('ts',{ascending:false}).limit(50);
  if(error){ el.innerHTML = '<div class="empty">โหลดบันทึกไม่ได้ (โปรดรัน schema-v7.sql เพื่อสร้างตาราง audit_log)</div>'; return; }
  const A = {approve_user:'✅ อนุมัติผู้ใช้', reject_user:'⛔ เพิกถอน/ปฏิเสธ', delete_user:'🗑️ ลบผู้ใช้', set_scope:'🗺️ ตั้งขอบเขตจังหวัด'};
  document.getElementById('cntAudit').textContent = (data||[]).length;
  el.innerHTML = (data||[]).map(x=>`<div class="urow"><div><div class="nm">${esc(A[x.action]||x.action)}</div><div class="em">${esc(x.actor_email||'')} → ${esc(x.target||'')}${x.detail?(' · '+esc(JSON.stringify(x.detail))):''}</div><div class="when">${fmtWhen(x.ts)}</div></div></div>`).join('') || '<div class="empty">ยังไม่มีบันทึก</div>';
}

function renderAuthHeader(state, profile){
  const el = document.getElementById('authBox');
  if (state==='signedout') { el.innerHTML = ''; return; }
  el.innerHTML = `<span style="opacity:.9">${esc(profile.full_name||profile.email)}</span><button onclick="signOut()">ออกจากระบบ</button>`;
}

function showGateMessage(html){
  document.getElementById('gate').innerHTML = `<div class="gatebox">${html}</div>`;
  document.getElementById('gate').style.display = 'block';
  document.getElementById('panels').style.display = 'none';
}

async function loadAllProfiles(){
  const { data, error } = await sb
    .from('profiles')
    .select('id, email, full_name, phone, role, status, created_at, approved_at, province_scope')
    .order('created_at', { ascending:false });
  if (error) { console.error(error); return; }

  const pending = data.filter(p=>p.status==='pending');
  const approved = data.filter(p=>p.status==='approved');
  const rejected = data.filter(p=>p.status==='rejected');

  document.getElementById('cntPending').textContent = pending.length;
  document.getElementById('cntApproved').textContent = approved.length;
  document.getElementById('cntRejected').textContent = rejected.length;

  document.getElementById('listPending').innerHTML = pending.length ? pending.map(p=>`
    <div class="urow">
      <div>
        <div class="nm">${esc(p.full_name||'(ไม่ระบุชื่อ)')} ${p.role==='admin'?'<span class=\"pill\" style=\"background:#57504a\">แอดมิน</span>':''}</div>
        <div class="em">${esc(p.email)}</div>
        <div class="when">สมัครเมื่อ ${fmtWhen(p.created_at)}</div>
      </div>
      <div class="btns">
        <button class="btn-approve" onclick="setStatus('${p.id}','approved')">✓ อนุมัติ</button>
        <button class="btn-reject" onclick="setStatus('${p.id}','rejected')">✕ ปฏิเสธ</button>
        ${p.role==='admin' ? '' : `<button class="btn-reject" onclick="deleteUser('${p.id}','${esc(p.email)}')">🗑️ ลบ</button>`}
      </div>
    </div>`).join('') : '<div class="empty">ไม่มีคำขอรออนุมัติ</div>';

  document.getElementById('listApproved').innerHTML = approved.length ? approved.map(p=>`
    <div class="urow">
      <div>
        <div class="nm">${esc(p.full_name||'(ไม่ระบุชื่อ)')} ${p.role==='admin'?'<span class=\"pill\" style=\"background:#57504a\">แอดมิน</span>':''}</div>
        <div class="em">${esc(p.email)}</div>
        <div class="when">อนุมัติเมื่อ ${fmtWhen(p.approved_at)}</div>
        ${scopeSelect(p)}
      </div>
      <div class="btns">
        ${p.role==='admin' ? '' : `<button class="btn-revoke" onclick="setStatus('${p.id}','rejected')">เพิกถอนสิทธิ์</button>
        <button class="btn-reject" onclick="deleteUser('${p.id}','${esc(p.email)}')">🗑️ ลบ</button>`}
      </div>
    </div>`).join('') : '<div class="empty">ยังไม่มีผู้ใช้ที่อนุมัติแล้ว</div>';

  document.getElementById('listRejected').innerHTML = rejected.length ? rejected.map(p=>`
    <div class="urow">
      <div>
        <div class="nm">${esc(p.full_name||'(ไม่ระบุชื่อ)')}</div>
        <div class="em">${esc(p.email)}</div>
      </div>
      <div class="btns">
        <button class="btn-approve" onclick="setStatus('${p.id}','approved')">✓ อนุมัติแทน</button>
        <button class="btn-reject" onclick="deleteUser('${p.id}','${esc(p.email)}')">🗑️ ลบ</button>
      </div>
    </div>`).join('') : '<div class="empty">ไม่มี</div>';
}

async function setStatus(id, status){
  const patch = { status };
  if (status === 'approved') {
    const me = await getUser();
    patch.approved_at = new Date().toISOString();
    patch.approved_by = me.id;
  }
  const { error } = await sb.from('profiles').update(patch).eq('id', id);
  if (error) { alert('ไม่สำเร็จ: ' + error.message); return; }
  logAudit(status==='approved'?'approve_user':'reject_user', id, {status});
  loadAllProfiles();
}

async function deleteUser(id, email){
  if (!confirm(`ยืนยันลบผู้ใช้ ${email} ออกจากระบบ?\n\nหมายเหตุ: ถ้าผู้ใช้นี้ sign-in ด้วย Google อีกครั้ง จะกลับมาเป็นสถานะ "รออนุมัติ" (ไม่สามารถบันทึกข้อมูลได้จนกว่าจะอนุมัติใหม่)`)) return;
  const { error } = await sb.from('profiles').delete().eq('id', id);
  if (error) { alert('ลบไม่สำเร็จ: ' + error.message); return; }
  logAudit('delete_user', email);
  loadAllProfiles();
}

watchAuthState({
  onSignedOut: () => {
    renderAuthHeader('signedout');
    showGateMessage(`
      <h2 style="margin-bottom:8px">🔒 หน้านี้สำหรับผู้ดูแลระบบ</h2>
      <p style="color:var(--muted);font-size:13px">กรุณาเข้าสู่ระบบด้วยบัญชี Google ที่ได้รับสิทธิ์แอดมิน</p>
      <button onclick="signInWithGoogle()">เข้าสู่ระบบด้วย Google</button>`);
  },
  onPending: (p) => {
    renderAuthHeader('pending', p);
    showGateMessage(`<h2>⏳ บัญชีของคุณกำลังรออนุมัติ</h2><p style="color:var(--muted);font-size:13px;margin-top:6px">หน้านี้ใช้ได้เฉพาะผู้ดูแลระบบเท่านั้น</p>`);
  },
  onRejected: (p) => {
    renderAuthHeader('rejected', p);
    showGateMessage(`<h2>🚫 ไม่มีสิทธิ์เข้าถึง</h2>`);
  },
  onApproved: (p) => {
    renderAuthHeader('approved', p);
    showGateMessage(`<h2>🚫 หน้านี้สำหรับผู้ดูแลระบบเท่านั้น</h2><p style="color:var(--muted);font-size:13px;margin-top:6px">บัญชีของคุณได้รับอนุมัติแล้ว แต่ไม่มีสิทธิ์แอดมิน</p>`);
  },
  onAdmin: (p) => {
    renderAuthHeader('admin', p);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('panels').style.display = 'block';
    loadAllProfiles(); checkHealth(); loadAudit();
  }
});
</script>
<script src="js/pwa.js" defer></script>
</body>
</html>
